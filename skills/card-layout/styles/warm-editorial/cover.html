<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<link href="https://fontsapi.zeoseven.com/309/main/result.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{ --paper:#EFE9DC; --ink:#1F1B16; --accent:#B85C44; }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1080px;height:1440px;}
  body{
    background:var(--paper); color:var(--ink);
    font-family:'KingHwaOldSong','Playfair Display',serif;
    position:relative;
  }
  .brand{position:absolute; top:96px; left:90px; color:var(--accent); font-size:27px; letter-spacing:.06em; line-height:1.4;}
  .main{position:absolute; top:50%; left:90px; right:90px; transform:translateY(-52%);}
  .title{font-size:132px; line-height:1.08; letter-spacing:.02em; color:var(--ink);}
  .sub{font-size:34px; line-height:1.6; color:var(--ink); margin-top:44px; max-width:840px;}
  .bottom{position:absolute; bottom:96px; left:90px; right:90px; display:flex; align-items:center; justify-content:space-between;}
  .foot{color:var(--accent); font-size:27px; letter-spacing:.05em;}
  .foot .rule{display:block; width:52px; height:3px; background:var(--accent); margin-top:14px;}
/*ALIGNFIX*/h1,h2,.num{margin-left:-0.06em;}</style>
</head>
<body>
  <div class="brand">好好生活<br>SLOW LIVING</div>

  <div class="main">
    <h1 class="title">好好生活的<br>6 个小习惯</h1>
    <p class="sub">不是要你变厉害，是把每天的小事做稳——真正的从容，藏在这些不起眼的动作里。</p>
  </div>

  <div class="bottom">
    <div class="foot">收藏起来 · 一个一个慢慢来<span class="rule"></span></div>
  </div>
</body>
</html>
