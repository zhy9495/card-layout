<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8">
<link href="https://fontsapi.zeoseven.com/309/main/result.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{ --paper:#EFE9DC; --ink:#1F1B16; --accent:#B85C44; --muted:#9A8F80; }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1080px;height:1440px;}
  body{ background:var(--paper); color:var(--ink); font-family:'KingHwaOldSong','Playfair Display',serif; position:relative; }
  .brand{ position:absolute; top:96px; left:90px; color:var(--accent); font-size:27px; letter-spacing:.06em; }
  .main{ position:absolute; top:50%; left:90px; right:90px; transform:translateY(-52%); }
  .title{ font-size:78px; line-height:1.1; margin-bottom:64px; }
  .row{ padding:34px 0; border-top:1.5px solid rgba(31,27,22,.18); }
  .row:last-child{ border-bottom:1.5px solid rgba(31,27,22,.18); }
  .mark{ font-size:46px; margin-right:20px; }
  .x{ color:var(--muted); } .v{ color:var(--accent); }
  .lab{ font-size:40px; } .lab.dim{ color:var(--muted); }
  .desc{ font-size:31px; line-height:1.6; margin-top:10px; color:var(--ink); }
  .desc.dim{ color:var(--muted); }
  .foot{ position:absolute; bottom:96px; left:90px; color:var(--accent); font-size:25px; letter-spacing:.05em; }
/*ALIGNFIX*/h1,h2,.num{margin-left:-0.06em;}</style></head>
<body>
  <div class="brand">好好生活</div>
  <div class="main">
    <h2 class="title">靠意志 还是 靠系统</h2>
    <div class="row"><span class="mark x">✕</span><span class="lab dim">靠意志力</span><div class="desc dim">今天一累就崩，三天打鱼两天晒网。</div></div>
    <div class="row"><span class="mark v">✓</span><span class="lab">靠系统</span><div class="desc">固定时间、固定地点，到点自动发生。</div></div>
  </div>
  <div class="foot">好好生活 · 对比</div>
</body></html>
