<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8">
<link href="https://fontsapi.zeoseven.com/309/main/result.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{ --paper:#EFE9DC; --ink:#1F1B16; --accent:#B85C44; }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1080px;height:1440px;}
  body{ background:var(--paper); color:var(--ink); font-family:'KingHwaOldSong','Playfair Display',serif; position:relative; }
  .brand{ position:absolute; top:96px; left:90px; color:var(--accent); font-size:27px; letter-spacing:.06em; }
  .main{ position:absolute; top:50%; left:90px; right:90px; transform:translateY(-52%); }
  .quote{ font-size:96px; line-height:1.34; letter-spacing:.02em; }
  .rule{ width:120px; height:4px; background:var(--accent); margin-top:54px; }
  .foot{ position:absolute; bottom:96px; left:90px; color:var(--accent); font-size:25px; letter-spacing:.05em; }
/*ALIGNFIX*/h1,h2,.num{margin-left:-0.06em;}</style></head>
<body>
  <div class="brand">好好生活</div>
  <div class="main">
    <h1 class="quote">你不必很厉害，<br>才配过得好。</h1>
    <div class="rule"></div>
  </div>
  <div class="foot">好好生活 · 金句</div>
</body></html>
