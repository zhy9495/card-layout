<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8">
<link href="https://fontsapi.zeoseven.com/309/main/result.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400&display=swap" rel="stylesheet">
<style>
:root{--paper:#EFE9DC;--ink:#1F1B16;--accent:#B85C44;}
*{margin:0;padding:0;box-sizing:border-box;}html,body{width:1080px;height:1440px;}
body{background:var(--paper);color:var(--ink);font-family:'KingHwaOldSong','Playfair Display',serif;position:relative;}
.brand{position:absolute;top:96px;left:90px;color:var(--accent);font-size:27px;letter-spacing:.06em;}
.main{position:absolute;top:50%;left:90px;right:96px;transform:translateY(-52%);}
.main p{font-size:44px;line-height:1.9;margin-bottom:18px;}
.main .hl{color:var(--accent);}
.foot{position:absolute;bottom:96px;left:90px;color:var(--accent);font-size:25px;letter-spacing:.05em;}
/*ALIGNFIX*/h1,h2,.num{margin-left:-0.06em;}</style></head><body>
<div class="brand">好好生活</div>
<div class="main">
<p>好好生活，从来不是把日子填满。</p>
<p>是忙完一切之后，<br>还愿意为自己，留一点点。</p>
<p>一杯温水，一段散步，一句晚安——</p>
<p>这些小事不起眼，<br>却是你和生活，<span class="hl">还好好相爱</span>的证据。</p>
</div>
<div class="foot">好好生活 · 随笔</div>
</body></html>
