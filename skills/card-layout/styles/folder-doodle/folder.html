<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<link href="https://fontsapi.zeoseven.com/376/main/result.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Noto+Sans+SC:wght@400;500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{ --paper:#F3F0E2; --ink:#33271F; --maroon:#5C1A17; --coral:#F0613E; --pink:#F08FC6; --blue:#A8C8EE; }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1080px;height:1440px;}
  body{ background:var(--paper); color:var(--ink); font-family:'Inter','Noto Sans SC',sans-serif;
    padding:96px 70px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
  .handle{font-size:26px; letter-spacing:.18em; color:var(--ink); font-weight:600;}
  .headline{ font-family:'WenJin Mincho Plane 0','Playfair Display',serif; font-weight:400;
    -webkit-text-stroke:0.9px var(--maroon);   /* 稍微加粗:同色描边增重 */
    color:var(--maroon); font-size:106px; line-height:1.12; margin-top:40px; position:relative; letter-spacing:.02em; }
  .bolt{position:absolute; top:-38px; right:14px; width:50px; height:60px; transform:rotate(10deg);}
  .sub{font-size:31px; line-height:1.5; margin-top:34px; color:var(--ink); max-width:760px;}
  .row{display:flex; width:100%; gap:38px; margin-top:30px;}
  .row.arrows > div{flex:1; display:flex; justify-content:center;}
  .arrows svg{width:70px; height:84px;}
  .folders{margin-top:4px;}
  .col{flex:1; display:flex; flex-direction:column; align-items:center;}
  .folder{ position:relative; width:100%; height:148px; border-radius:3px 16px 16px 16px; display:flex; align-items:center; justify-content:center; }
  .folder::before{ content:""; position:absolute; top:-24px; left:0; width:48%; height:28px; border-radius:14px 14px 0 0; background:inherit; }
  .label{font-size:34px; font-weight:600; color:var(--ink); position:relative; z-index:1;}
  .explain{font-size:26px; line-height:1.58; margin-top:30px; color:var(--ink);}
  .explain b{font-weight:600;}
</style>
</head>
<body>
  <div class="handle">@雅思听力笔记</div>
  <h1 class="headline">原来连读<br>只有三种
    <svg class="bolt" viewBox="0 0 54 64" fill="none"><path d="M30 4 L12 36 L26 36 L20 60 L44 26 L30 26 Z" stroke="var(--coral)" stroke-width="4" stroke-linejoin="round"/></svg>
  </h1>
  <p class="sub">听力总慢半拍？不是英文说太快——<br>是这三种连读，你没拆开过。</p>
  <div class="row arrows">
    <div><svg viewBox="0 0 70 84" fill="none"><path d="M40 6 C 18 28, 56 48, 32 70" stroke="var(--coral)" stroke-width="4" stroke-linecap="round"/><path d="M20 58 L31 72 L44 62" stroke="var(--coral)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div><svg viewBox="0 0 70 84" fill="none"><path d="M35 6 C 35 30, 35 48, 35 70" stroke="var(--pink)" stroke-width="4" stroke-linecap="round"/><path d="M23 58 L35 72 L47 58" stroke="var(--pink)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <div><svg viewBox="0 0 70 84" fill="none"><path d="M30 6 C 52 28, 14 48, 38 70" stroke="var(--blue)" stroke-width="4" stroke-linecap="round"/><path d="M26 60 L39 72 L50 58" stroke="var(--blue)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
  </div>
  <div class="row folders">
    <div class="col"><div class="folder" style="background:var(--coral)"><span class="label">连读</span></div><p class="explain">辅音结尾撞上元音开头，连成一个音。<br><b>an apple → a-napple</b></p></div>
    <div class="col"><div class="folder" style="background:var(--pink)"><span class="label">变音</span></div><p class="explain">两个音相撞，前一个被带得变样。<br><b>this year → thi-shyear</b></p></div>
    <div class="col"><div class="folder" style="background:var(--blue)"><span class="label">略读</span></div><p class="explain">挨着的相同/相近音，吞掉一个。<br><b>next time → nex time</b></p></div>
  </div>
</body>
</html>
