<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8">
<link href="https://fontsapi.zeoseven.com/376/main/result.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--paper:#F3F0E2;--ink:#33271F;--maroon:#5C1A17;--coral:#F0613E;--pink:#F08FC6;--blue:#A8C8EE;}
*{margin:0;padding:0;box-sizing:border-box;}html,body{width:1080px;height:1440px;}
body{background:var(--paper);color:var(--ink);font-family:'Inter','Noto Sans SC',sans-serif;position:relative;padding:96px 84px;overflow:hidden;}
.serif{font-family:'WenJin Mincho Plane 0','Playfair Display',serif;font-weight:400;color:var(--maroon);-webkit-text-stroke:.5px var(--maroon);}
.handle{font-size:25px;letter-spacing:.16em;font-weight:600;text-align:center;}
.foot{position:absolute;bottom:80px;left:84px;right:84px;display:flex;justify-content:space-between;font-size:24px;font-weight:600;color:var(--ink);}
.folder{position:relative;border-radius:3px 14px 14px 14px;display:flex;align-items:center;justify-content:center;}
.folder::before{content:"";position:absolute;top:-22px;left:0;width:46%;height:26px;border-radius:12px 12px 0 0;background:inherit;}
.mid{position:absolute;top:50%;left:84px;right:84px;transform:translateY(-50%);text-align:center;}
.t{font-size:64px;text-align:center;margin-bottom:40px;}.it{display:flex;gap:24px;align-items:baseline;text-align:left;padding:18px 0;border-bottom:1.5px solid rgba(51,39,31,.16);}.in{color:var(--coral);font-weight:700;font-size:38px;width:54px;font-family:'Inter';}.ix{font-size:35px;font-family:'Noto Sans SC';}
</style></head><body>
<div class="handle">@雅思听力笔记</div>
<div class="mid"><h2 class="serif t">练听力 · 5 个习惯</h2><div class="it"><span class="in">1</span><span class="ix">每天精听一小段，别贪长</span></div><div class="it"><span class="in">2</span><span class="ix">先盲听，再看文本核对</span></div><div class="it"><span class="in">3</span><span class="ix">把听错的地方反复跟读</span></div><div class="it"><span class="in">4</span><span class="ix">原速听，别一上来就放慢</span></div><div class="it"><span class="in">5</span><span class="ix">同一段，隔天再听一次</span></div></div>
<div class="foot"><span>@雅思听力笔记</span><span>清单</span></div>
</body></html>
