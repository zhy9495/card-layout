<style>
:root{--paper:#F3F0E2;--ink:#33271F;--maroon:#5C1A17;--coral:#F0613E;--pink:#F08FC6;--blue:#A8C8EE;}
*{margin:0;padding:0;box-sizing:border-box;}html,body{width:1080px;height:1440px;}
body{background:var(--paper);color:var(--ink);font-family:'Inter','Noto Sans SC',sans-serif;position:relative;padding:96px 84px;overflow:hidden;}

.foot{position:absolute;bottom:80px;left:84px;right:84px;display:flex;justify-content:space-between;font-size:24px;font-weight:600;color:var(--ink);}
.folder{position:relative;border-radius:3px 14px 14px 14px;display:flex;align-items:center;justify-content:center;}
.folder::before{content:"";position:absolute;top:-22px;left:0;width:46%;height:26px;border-radius:12px 12px 0 0;background:inherit;}
.mid{position:absolute;top:50%;left:84px;right:84px;transform:translateY(-50%);text-align:center;}
.t{font-size:118px;line-height:1.12;}.sub{font-size:34px;line-height:1.6;margin-top:34px;font-family:'Noto Sans SC';}

<div class="mid"><h1 class="serif t">听力为什么<br>总跟不上 <svg width="44" height="52" style="vertical-align:middle"><path d="M26 4 L10 30 L22 30 L17 50 L38 22 L26 22 Z" stroke="var(--coral)" stroke-width="3.5" fill="none" stroke-linejoin="round"/></svg></h1><p class="sub">不是耳朵的问题——<br>是这几件事，你一直没做对。</p></div>
