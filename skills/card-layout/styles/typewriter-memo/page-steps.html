<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#F1ECDD;--ink:#2B2824;--stamp:#B23A2E;--muted:#9C9484;}
*{margin:0;padding:0;box-sizing:border-box;}html,body{width:1080px;height:1440px;}
body{background:var(--paper);color:var(--ink);font-family:'JetBrains Mono','Noto Sans SC',monospace;position:relative;padding:96px 96px 90px;}
body::before{content:"";position:absolute;inset:0;pointer-events:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");opacity:.07;mix-blend-mode:multiply;}
.head{display:flex;justify-content:space-between;border-bottom:2px dashed var(--ink);padding-bottom:16px;font-size:25px;font-weight:700;letter-spacing:.1em;}
.body{position:absolute;top:50%;left:96px;right:96px;transform:translateY(-50%);}
.ln{font-family:'JetBrains Mono','Noto Sans SC',monospace;font-size:38px;line-height:1.9;border-bottom:1.5px solid rgba(43,40,36,.16);padding-bottom:6px;margin-bottom:26px;}
.stamp{position:absolute;right:20px;bottom:300px;transform:rotate(-11deg);border:5px solid var(--stamp);color:var(--stamp);font-weight:700;font-size:42px;letter-spacing:.1em;padding:12px 24px;border-radius:8px;opacity:.85;}
.foot{position:absolute;bottom:80px;left:96px;right:96px;display:flex;justify-content:space-between;font-size:23px;color:var(--muted);letter-spacing:.08em;}
.t{font-size:50px;font-weight:700;margin-bottom:36px;}.st{font-size:35px;line-height:1.5;border-bottom:1.5px solid rgba(43,40,36,.16);padding:18px 0;}
</style></head><body>
<div class="head"><span>MEMO ｜ 备忘</span><span>NO.06</span></div>
<div class="body"><div class="t">情绪急救 · 3 步</div><div class="st">[1] 先离开现场，喝口水</div><div class="st">[2] 写下:我现在到底在气什么</div><div class="st">[3] 问:这事明天还要紧吗</div></div>
<div class="foot"><span>@给自己写信</span><span>2026 / 备忘录</span></div>
</body></html>
