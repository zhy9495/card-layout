<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#EFE9DC;--ink:#1A1A1A;--red:#E2412B;--blue:#2B57C4;--yellow:#F2C200;}
*{margin:0;padding:0;box-sizing:border-box;}html,body{width:1080px;height:1440px;}
body{background:var(--paper);color:var(--ink);font-family:'Inter','Noto Sans SC',sans-serif;position:relative;padding:90px;overflow:hidden;}
.h{font-family:'Noto Sans SC';font-weight:900;letter-spacing:-.01em;}
.lab{font-size:25px;font-weight:700;letter-spacing:.16em;}
.foot{position:absolute;bottom:90px;left:90px;right:90px;display:flex;justify-content:space-between;border-top:3px solid var(--ink);padding-top:16px;font-size:25px;font-weight:700;letter-spacing:.08em;}
.mid{position:absolute;top:50%;left:90px;right:90px;transform:translateY(-50%);}
.cir{border-radius:50%;}
.t{font-size:66px;margin-bottom:36px;}.it{display:flex;align-items:center;gap:24px;padding:20px 0;border-bottom:2px solid rgba(26,26,26,.15);}.bl{width:26px;height:26px;flex:none;}.ix{font-size:36px;font-family:"Noto Sans SC";}
</style></head><body>
<div class="lab">BAUHAUS ｜ 设计思维</div>
<div class="mid"><h2 class="h t">化繁为简 · 4 问</h2><div class="it"><div class="bl" style="background:var(--red)"></div><span class="ix">这一步，能删掉吗?</span></div><div class="it"><div class="bl cir" style="background:var(--blue)"></div><span class="ix">能合并成一步吗?</span></div><div class="it"><div class="bl" style="background:var(--yellow)"></div><span class="ix">顺序能不能更顺?</span></div><div class="it"><div class="bl cir" style="background:var(--ink)"></div><span class="ix">能让它自动发生吗?</span></div></div>
<div class="foot"><span>@设计思维笔记</span><span>清单</span></div>
</body></html>
