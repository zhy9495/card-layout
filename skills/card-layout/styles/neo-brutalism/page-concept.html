<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Inter:wght@600;800&display=swap" rel="stylesheet">
<style>
:root{--paper:#F4EFDF;--ink:#111111;--yellow:#FFD23F;--pink:#FF5CA8;--cyan:#4ECDC4;}
*{margin:0;padding:0;box-sizing:border-box;}html,body{width:1080px;height:1440px;}
body{background:var(--paper);color:var(--ink);font-family:'Inter','Noto Sans SC',sans-serif;position:relative;padding:90px;
 background-image:radial-gradient(var(--ink) 2px,transparent 2px);background-size:38px 38px;}
.h{font-family:'Noto Sans SC';font-weight:900;letter-spacing:-.01em;}
.tag{display:inline-block;background:var(--cyan);border:5px solid var(--ink);box-shadow:8px 8px 0 var(--ink);font-weight:800;font-size:26px;letter-spacing:.08em;padding:12px 24px;}
.box{border:7px solid var(--ink);box-shadow:16px 16px 0 var(--ink);padding:50px 46px;}
.foot{position:absolute;bottom:80px;left:90px;right:90px;display:flex;justify-content:space-between;font-weight:800;font-size:25px;}
.mid{position:absolute;top:50%;left:90px;right:90px;transform:translateY(-50%);}
.t{font-size:96px;line-height:1.05;margin-bottom:26px;}.def{font-size:35px;line-height:1.7;font-family:'Noto Sans SC';}
</style></head><body>
<div class="mid"><div class="box" style="background:var(--yellow)"><h1 class="h t">反刍思维</h1><p class="def">像牛反刍一样，把负面念头嚼了又嚼——越嚼越苦，事却没变。</p></div></div>
<div class="foot"><span>@清醒一点</span><span>概念</span></div>
</body></html>
