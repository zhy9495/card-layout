<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;700;900&family=Inter:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root{ --paper:#F4EFDF; --ink:#111111; --yellow:#FFD23F; --pink:#FF5CA8; --cyan:#4ECDC4; }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1080px;height:1440px;}
  body{ background:var(--paper); color:var(--ink); font-family:'Inter','Noto Sans SC',sans-serif; position:relative; padding:90px;
    background-image:radial-gradient(var(--ink) 2px, transparent 2px); background-size:38px 38px; }
  .tag{ display:inline-block; background:var(--cyan); border:5px solid var(--ink); box-shadow:9px 9px 0 var(--ink);
    font-weight:800; font-size:27px; letter-spacing:.1em; padding:12px 26px; }
  .box{ margin-top:70px; background:var(--yellow); border:7px solid var(--ink); box-shadow:18px 18px 0 var(--ink);
    padding:64px 58px; }
  .headline{ font-family:'Noto Sans SC',sans-serif; font-weight:900; font-size:138px; line-height:1.02; letter-spacing:-.01em; }
  .sub{ margin-top:96px; background:var(--pink); border:6px solid var(--ink); box-shadow:12px 12px 0 var(--ink);
    padding:34px 40px; font-family:'Noto Sans SC',sans-serif; font-weight:700; font-size:38px; line-height:1.4; transform:rotate(-1.5deg); }
  .foot{ position:absolute; bottom:84px; left:90px; right:90px; display:flex; justify-content:space-between; font-weight:800; font-size:26px; }
</style></head>
<body>
  <span class="tag">★ 别再内耗</span>
  <div class="box"><h1 class="headline">停止内耗<br>从今天</h1></div>
  <div class="sub">想十遍，不如做一遍——<br>动起来，焦虑就追不上你。</div>
  <div class="foot"><span>@清醒一点</span><span>STOP / OVERTHINKING</span></div>
</body></html>
