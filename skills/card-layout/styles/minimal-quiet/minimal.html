<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@200;300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{ --paper:#FAF8F3; --ink:#2A2A28; --muted:#B4AEA2; --accent:#9A6B4F; }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1080px;height:1440px;}
  body{ background:var(--paper); color:var(--ink); font-family:'Inter','Noto Sans SC',sans-serif;
    position:relative; padding:110px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
  .label{ position:absolute; top:110px; left:0; right:0; text-align:center; font-size:23px; font-weight:400; letter-spacing:.42em; color:var(--muted); }
  .dot{ width:9px; height:9px; border-radius:50%; background:var(--accent); margin-bottom:60px; }
  .title{ font-family:'Noto Sans SC',sans-serif; font-weight:300; font-size:82px; line-height:1.5; letter-spacing:.14em; }
  .hr{ width:64px; height:1px; background:var(--muted); margin:60px 0; }
  .sub{ font-weight:300; font-size:29px; line-height:2; letter-spacing:.1em; color:var(--ink); max-width:620px; }
  .foot{ position:absolute; bottom:90px; left:0; right:0; text-align:center; font-size:22px; letter-spacing:.2em; color:var(--muted); }
</style></head>
<body>
  <div class="label">L E S S</div>
  <div class="dot"></div>
  <h1 class="title">留白<br>是一种能力</h1>
  <div class="hr"></div>
  <p class="sub">把不必要的拿走，<br>剩下的才有了呼吸。</p>
  <div class="foot">@ 够 用 就 好</div>
</body></html>
