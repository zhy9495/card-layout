<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@200;300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--paper:#FAF8F3;--ink:#2A2A28;--muted:#B4AEA2;--accent:#9A6B4F;}
*{margin:0;padding:0;box-sizing:border-box;}html,body{width:1080px;height:1440px;}
body{background:var(--paper);color:var(--ink);font-family:'Inter','Noto Sans SC',sans-serif;position:relative;padding:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.lab{position:absolute;top:116px;left:0;right:0;text-align:center;font-size:22px;font-weight:400;letter-spacing:.42em;color:var(--muted);}
.hr{width:60px;height:1px;background:var(--muted);margin:54px auto;}
.foot{position:absolute;bottom:90px;left:0;right:0;text-align:center;font-size:22px;letter-spacing:.2em;color:var(--muted);}
.zh{font-family:'Noto Sans SC';}
.r{font-weight:300;font-size:46px;letter-spacing:.1em;font-family:'Noto Sans SC';}.r.dim{color:var(--muted);}.d{font-weight:300;font-size:27px;letter-spacing:.06em;margin-top:14px;font-family:'Noto Sans SC';color:var(--muted);}.d.on{color:var(--ink);}
</style></head><body>
<div class="lab">VS</div>
<div class="r dim">拥 有</div><p class="d">买回来，放着，落灰。</p><div class="hr"></div><div class="r">享 有</div><p class="d on">真正用它，常常用它。</p>
<div class="foot">@ 够 用 就 好</div>
</body></html>
