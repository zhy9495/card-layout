<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8">

<style>
:root{--paper:#F2F0EA;--ink:#141414;--red:#E2231A;--muted:#9A968C;}
*{margin:0;padding:0;box-sizing:border-box;}html,body{width:1080px;height:1440px;}

<div class="top"><span>概念 · CONCEPT</span><span class="r">CONCEPT</span></div><div class="sq"></div><div class="mid"><h1 class="h" style="font-size:128px;line-height:1.05">间隔<br>重复</h1><p class="def">学完不是终点。<span style="color:var(--red)">隔一段时间再复习一次</span>，记忆才会从「短期」搬进「长期」。</p></div><div class="foot"><span>@雅思上岸笔记</span><span>02 / 08</span></div>
</body></html>
