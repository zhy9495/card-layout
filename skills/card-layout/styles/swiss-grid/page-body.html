<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--paper:#F2F0EA;--ink:#141414;--red:#E2231A;}
*{margin:0;padding:0;box-sizing:border-box;}html,body{width:1080px;height:1440px;}
body{background:var(--paper);color:var(--ink);font-family:'Inter','Noto Sans SC',sans-serif;position:relative;padding:90px;}
.top{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid var(--ink);padding-bottom:16px;font-size:25px;font-weight:500;letter-spacing:.14em;}
.top .r{color:var(--red);}
.main{position:absolute;top:50%;left:90px;right:96px;transform:translateY(-50%);}
.main p{font-family:'Noto Sans SC';font-weight:400;font-size:40px;line-height:1.85;margin-bottom:20px;}
.main .hl{color:var(--red);font-weight:500;}
.foot{position:absolute;bottom:90px;left:90px;right:90px;display:flex;justify-content:space-between;align-items:center;border-top:2px solid var(--ink);padding-top:18px;font-size:25px;font-weight:500;letter-spacing:.08em;}
</style></head><body>
<div class="top"><span>随笔 · ESSAY</span><span class="r">ESSAY</span></div>
<div class="main">
<p>记忆不是仓库，是肌肉。</p>
<p>你越是<span class="hl">间隔着用它</span>，它越强壮。</p>
<p>一口气塞十遍，像一次举太重的杠铃——<br>当下很猛，第二天全还给你。</p>
<p>真正记住的人，只是把复习，<br>摊成了好几天。</p>
</div>
<div class="foot"><span>@雅思上岸笔记</span><span>随笔</span></div>
</body></html>
