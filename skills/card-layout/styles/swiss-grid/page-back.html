<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#F2F0EA;--ink:#141414;--red:#E2231A;--muted:#9A968C;}
*{margin:0;padding:0;box-sizing:border-box;}html,body{width:1080px;height:1440px;}
body{background:var(--paper);color:var(--ink);font-family:'Inter','Noto Sans SC',sans-serif;position:relative;padding:90px;}
.top{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid var(--ink);padding-bottom:16px;font-size:25px;font-weight:500;letter-spacing:.14em;}
.top .r{color:var(--red);}
.zh{font-family:'Noto Sans SC',sans-serif;}
.h{font-family:'Noto Sans SC',sans-serif;font-weight:900;letter-spacing:-.01em;}
.foot{position:absolute;bottom:90px;left:90px;right:90px;display:flex;justify-content:space-between;align-items:center;border-top:2px solid var(--ink);padding-top:18px;font-size:25px;font-weight:500;letter-spacing:.08em;}
.mid{margin-top:130px;}
.big{font-family:'Noto Sans SC';font-weight:900;font-size:118px;line-height:1.1;}.blk{display:inline-block;background:var(--red);color:var(--paper);font-family:'Noto Sans SC';font-weight:700;font-size:34px;padding:16px 30px;margin-top:50px;}.sup{font-size:32px;line-height:1.6;margin-top:34px;font-family:'Noto Sans SC';}
</style></head><body>
<div class="top"><span>收藏 · FOLLOW</span><span class="r">THE END</span></div><div class="mid" style="top:50%;position:absolute;left:90px;right:90px;transform:translateY(-50%);margin:0"><div class="big">记忆有方法<br>背单词不靠硬扛</div><div class="blk">关注 @雅思上岸笔记</div><p class="sup">下次更新:听力连读怎么练。</p></div><div class="foot"><span>@雅思上岸笔记</span><span>08 / 08</span></div>
</body></html>
