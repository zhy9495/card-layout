<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8">
<link href="https://fontsapi.zeoseven.com/376/main/result.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--paper:#F1EEE3;--ink:#1A1A1A;--lime:#D8F24A;--muted:#8A857A;}
*{margin:0;padding:0;box-sizing:border-box;}html,body{width:1080px;height:1440px;}
body{background:var(--paper);color:var(--ink);font-family:'Inter','Noto Sans SC',sans-serif;position:relative;overflow:hidden;padding:110px 96px;display:flex;flex-direction:column;justify-content:center;}
body::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");opacity:.10;mix-blend-mode:multiply;}
.c{position:relative;z-index:1;}
.serif{font-family:'WenJin Mincho Plane 0','Playfair Display',serif;font-weight:400;margin-left:-0.09em;}
.kicker{font-size:27px;letter-spacing:.28em;color:var(--muted);margin-bottom:30px;}
.mark{background:linear-gradient(var(--lime),var(--lime));background-size:100% 44%;background-position:0 78%;background-repeat:no-repeat;padding:0 4px;}
.foot{position:absolute;bottom:80px;left:96px;right:96px;display:flex;justify-content:space-between;font-size:24px;letter-spacing:.04em;color:var(--muted);z-index:1;}
.term{font-size:108px;line-height:1.12;}.def{font-size:36px;line-height:1.75;margin-top:44px;max-width:840px;}
/*ALIGNFIX*/.serif{margin-left:-0.09em;}</style></head><body>
<div class="c">
<div class="kicker">概 念</div><h1 class="serif term">自我删减</h1><p class="def">在别人面前，你下意识把自己改小、改稳、改安全——<br>结果，也把真实，一起改没了。</p>
</div>
<div class="foot"><span>@心灵旷野</span><span>概念</span></div>
</body></html>
