<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8">
<link href="https://fontsapi.zeoseven.com/92/main/result.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#141414; --paper:#F2F0EA; --accent:#F5D300; }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1080px;height:1440px;}
  body{ background:var(--bg); color:var(--paper); font-family:'Smiley Sans Oblique','Noto Sans SC',sans-serif;
    position:relative; padding:96px; display:flex; flex-direction:column; justify-content:center; }
  .kicker{ font-family:'Noto Sans SC',sans-serif; font-weight:700; font-size:30px; letter-spacing:.1em; color:var(--paper); opacity:.7; margin-bottom:40px; }
  .headline{ font-family:'Smiley Sans Oblique','Noto Sans SC',sans-serif; font-size:120px; line-height:1.32; letter-spacing:.01em; }
  .headline .y{ color:var(--accent); }
  .foot{ position:absolute; bottom:90px; left:96px; right:96px; display:flex; justify-content:space-between;
    font-family:'Noto Sans SC',sans-serif; font-weight:500; font-size:26px; opacity:.75; }
/*ALIGNFIX*/h1,h2,.dyh{margin-left:-0.05em;}</style></head>
<body>
  <div class="kicker">// For those who blame themselves</div>
  <h1 class="headline">You're Not<br>Undisciplined<br>You Lack a <span class="y">SYSTEM</span></h1>
  <div class="foot"><span>@hustle.buddy</span><span>NO SYSTEM · NO RESULT</span></div>
</body></html>
